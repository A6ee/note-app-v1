<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>認知破壞終結者3.0 ✨</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="bg-gray-100">
    <div class="phone-container">
      <!-- =========================================================
        0) Home
      ========================================================== -->
      <div id="page-home" class="page page-home">
        <div class="home-scroll no-scrollbar">
          <!-- Header（放在 scroll container 第一層，避免 sticky/置中被 padding 影響） -->
          <header class="app-header">
            <div class="header-content-wrapper">
              <div class="left-slot">
                <p
                  class="text-[10px] text-gray-300 font-black tracking-widest uppercase"
                >
                  認知破壞終結者3.0
                </p>
              </div>
              <div class="center-slot">
                <h2
                  id="home-user-greeting"
                  class="text-base font-black text-gray-800"
                >
                  您好 ✨
                </h2>
              </div>
              <div class="right-slot">
                <div
                  class="w-10 h-10 bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden"
                >
                  <img id="home-avatar-img" src="" alt="Student" />
                </div>
              </div>
            </div>
          </header>

          <!-- 內容區 padding -->
          <div class="home-content px-6 pt-6">
            <div class="flex items-end gap-3 mb-10">
              <div class="relative flex-shrink-0">
                <div
                  class="w-14 h-18 bg-gray-100 rounded-b-xl overflow-hidden border-2 border-white shadow-md"
                >
                  <img
                    src="https://api.dicebear.com/7.x/bottts/svg?seed=Felix"
                    class="w-full h-full"
                    alt="Assistant"
                  />
                </div>
                <div
                  class="absolute -bottom-1 left-0 right-0 bg-white border border-[#13B5B1]/20 text-[8px] text-[#13B5B1] py-0.5 text-center font-black rounded-full"
                >
                  皮皮助手
                </div>
              </div>

              <div
                class="bg-[#F0F9F9] border border-[#13B5B1]/10 rounded-3xl rounded-bl-none p-4 flex-1 shadow-sm"
              >
                <p class="text-[11px] text-[#13B5B1] font-bold leading-relaxed">
                  今天想學習什麼？我已經為您的課程準備好了錄音與分析功能。
                </p>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
              <div
                data-page="page-list"
                class="home-grid-card"
                role="button"
                tabindex="0"
              >
                <div
                  class="w-12 h-12 bg-cyan-50 text-[#13B5B1] rounded-2xl flex items-center justify-center mb-1"
                >
                  <i class="fas fa-book-open"></i>
                </div>
                <h4>課堂筆記</h4>
                <p class="uppercase">Notes</p>
              </div>

              <div
                data-page="page-review"
                class="home-grid-card"
                role="button"
                tabindex="0"
              >
                <div
                  class="w-12 h-12 bg-orange-50 text-orange-400 rounded-2xl flex items-center justify-center mb-1"
                >
                  <i class="fas fa-graduation-cap"></i>
                </div>
                <h4>智能複習</h4>
                <p class="uppercase">Review</p>
              </div>

              <div
                data-page="page-trash"
                class="home-grid-card"
                role="button"
                tabindex="0"
              >
                <div
                  class="w-12 h-12 bg-red-50 text-red-400 rounded-2xl flex items-center justify-center mb-1"
                >
                  <i class="fas fa-trash-alt"></i>
                </div>
                <h4>回收站</h4>
                <p class="uppercase">Trash</p>
              </div>

              <div
                data-page="page-settings"
                class="home-grid-card"
                role="button"
                tabindex="0"
              >
                <div
                  class="w-12 h-12 bg-purple-50 text-purple-400 rounded-2xl flex items-center justify-center mb-1"
                >
                  <i class="fas fa-user-cog"></i>
                </div>
                <h4>個人設定</h4>
                <p class="uppercase">Settings</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Bottom CTA（統一按鈕 class） -->
        <div class="home-cta">
          <button data-action="start-record" class="cta-btn cta-primary">
            <i class="fas fa-microphone-alt text-lg"></i> 開始新錄音
          </button>
        </div>
      </div>

      <!-- =========================================================
        1) List
      ========================================================== -->
      <div id="page-list" class="page hidden page-list overflow-hidden">
        <header class="app-header shadow-sm">
          <div class="header-content-wrapper">
            <div class="left-slot">
              <div
                data-page="page-home"
                class="w-10 h-10 flex items-center justify-center rounded-xl text-gray-400 cursor-pointer active:scale-90 transition-all"
              >
                <i class="fas fa-chevron-left"></i>
              </div>
            </div>
            <div class="center-slot">
              <h1 class="text-base font-black text-gray-800">課堂記錄</h1>
            </div>
            <div class="right-slot"></div>
          </div>
        </header>

        <div class="list-bars-container bg-white">
          <div class="rwd-content-wrapper px-6 py-3 border-b border-gray-50">
            <div
              class="flex items-center bg-gray-50 rounded-2xl px-3 border border-gray-100 focus-within:border-[#13B5B1] transition-all"
            >
              <i class="fas fa-search text-gray-300 text-xs"></i>
              <input
                type="text"
                id="search-input"
                placeholder="搜尋筆記紀錄..."
                class="bg-transparent border-none outline-none px-2 py-2 text-xs w-full font-bold text-gray-600"
              />
            </div>
          </div>

          <div
            class="rwd-content-wrapper px-6 py-2 border-b border-gray-50 flex items-center justify-between bg-white/95 backdrop-blur-sm"
          >
            <div class="flex gap-4">
              <span
                data-filter="all"
                id="filter-all"
                class="text-xs font-black text-[#13B5B1] cursor-pointer border-b-2 border-[#13B5B1] pb-1"
                >全部</span
              >
              <span
                data-filter="fav"
                id="filter-fav"
                class="text-xs font-black text-gray-300 cursor-pointer pb-1"
                >★ 收藏</span
              >
            </div>
            <div class="flex items-center gap-3">
              <div class="relative flex items-center">
                <i
                  class="fas fa-calendar-day text-gray-300 text-sm cursor-pointer hover:text-[#13B5B1] transition-colors"
                  data-action="open-date-picker"
                ></i>
                <input
                  type="date"
                  id="date-filter"
                  class="absolute opacity-0 w-0 h-0 pointer-events-none"
                />
              </div>
              <div id="category-filter-container"></div>
            </div>
          </div>
        </div>

        <div class="list-scroll no-scrollbar">
          <div class="px-6 pt-6">
            <div class="flex p-1 bg-gray-100 rounded-full mb-8">
              <button
                data-list-view="note"
                id="list-tab-note"
                class="tab-btn flex-1 py-2.5 bg-[#13B5B1] text-white rounded-full text-[10px] font-black shadow-md"
              >
                AI 即時
              </button>
              <button
                data-list-view="transcript"
                id="list-tab-transcript"
                class="tab-btn flex-1 py-2.5 text-gray-400 rounded-full text-[10px] font-black"
              >
                逐字稿
              </button>
            </div>
            <div id="list-container" class="space-y-6"></div>
          </div>
        </div>
      </div>

      <!-- =========================================================
        2) Record
      ========================================================== -->
      <div id="page-record" class="page p-6 hidden">
        <header class="app-header">
          <div class="header-content-wrapper">
            <div class="left-slot">
              <button
                type="button"
                data-action="cancel-record"
                class="w-10 h-10 flex items-center justify-center rounded-2xl bg-gray-50 text-gray-400 active:scale-90 transition-all"
                aria-label="返回"
              >
                <i class="fas fa-chevron-left"></i>
              </button>
            </div>

            <div class="center-slot">
              <h1 class="page-title text-xl font-black text-gray-800">
                正在錄音
              </h1>
            </div>

            <div class="right-slot"></div>
          </div>
        </header>

        <div
          class="flex-1 flex flex-col items-center justify-center -mt-10 recording-active"
        >
          <div
            id="record-timer"
            class="text-6xl font-black text-gray-800 mb-6 tracking-tighter"
          >
            00:00
          </div>
          <div
            id="live-transcript"
            class="text-xs text-brand/60 font-medium mb-10 text-center px-6 h-12 italic leading-relaxed"
          >
            皮皮正在專心聽課...
          </div>
          <div
            class="w-full h-40 bg-brand-light rounded-[3.5rem] flex items-center justify-around px-12 mb-20 border border-brand/10"
          >
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
          </div>
          <button
            data-action="stop-record"
            id="stop-btn"
            class="w-24 h-24 bg-red-500 text-white rounded-full flex items-center justify-center text-3xl shadow-2xl active:scale-95 transition-all"
          >
            <i class="fas fa-stop"></i>
          </button>
        </div>
      </div>

      <!-- =========================================================
        3) Loading
      ========================================================== -->
      <div id="page-loading" class="page hidden bg-[#13B5B1]">
        <div
          class="flex-1 flex flex-col items-center justify-center text-white p-8 text-center"
        >
          <div class="relative w-44 h-44 mb-10">
            <div
              class="absolute inset-0 border-[6px] border-white/20 rounded-full"
            ></div>
            <div
              class="absolute inset-0 border-[6px] border-white rounded-full border-t-transparent animate-spin"
            ></div>
            <div
              class="absolute inset-0 flex items-center justify-center text-6xl font-black font-serif italic"
            ></div>
          </div>
          <h2 class="text-2xl font-black tracking-widest mb-3">
            皮皮正在整理筆記...
          </h2>
          <p
            id="loading-msg"
            class="text-white/60 text-xs font-bold uppercase tracking-widest"
          >
            精煉課堂重點中
          </p>
        </div>
      </div>

      <!-- =========================================================
        4) Content
      ========================================================== -->
      <div id="page-content" class="page hidden overflow-hidden">
        <header class="app-header">
          <div class="header-content-wrapper">
            <div class="left-slot">
              <button
                type="button"
                data-action="back-to-source"
                class="w-10 h-10 flex items-center justify-center rounded-2xl bg-gray-50 text-gray-400 active:scale-90 transition-all"
                aria-label="返回"
              >
                <i class="fas fa-chevron-left"></i>
              </button>
            </div>

            <div class="center-slot">
              <h1
                id="content-title"
                data-action="edit-title"
                class="page-title text-sm font-black text-gray-800 truncate px-4 text-center cursor-pointer hover:bg-gray-100 rounded-lg"
                role="button"
                tabindex="0"
              >
                課堂摘要
              </h1>
            </div>

            <div class="right-slot">
              <div class="flex gap-2">
                <button
                  type="button"
                  id="star-btn"
                  data-action="toggle-favorite"
                  class="w-10 h-10 flex items-center justify-center rounded-2xl bg-yellow-50 text-yellow-400 active:scale-90 transition-all"
                  aria-label="收藏"
                >
                  <i id="star-icon" class="far fa-star"></i>
                </button>

                <button
                  type="button"
                  data-action="delete-current"
                  class="w-10 h-10 flex items-center justify-center rounded-2xl bg-red-50 text-red-400 active:scale-90 transition-all"
                  aria-label="刪除"
                >
                  <i class="fas fa-trash-alt"></i>
                </button>

                <button
                  type="button"
                  data-action="export-pdf"
                  class="w-10 h-10 flex items-center justify-center rounded-2xl bg-[#13B5B1]/10 text-[#13B5B1] active:scale-90 transition-all"
                  aria-label="匯出PDF"
                >
                  <i class="fas fa-file-export"></i>
                </button>
              </div>
            </div>
          </div>
        </header>

        <div class="px-6 pt-4 pb-2 bg-white border-b border-gray-50">
          <div class="flex p-1 bg-gray-100 rounded-full mb-2">
            <button
              data-content-view="note"
              id="tab-note"
              class="tab-btn flex-1 py-2.5 bg-[#13B5B1] text-white rounded-full text-xs font-black shadow-md"
            >
              AI 即時筆記
            </button>
            <button
              data-content-view="transcript"
              id="tab-transcript"
              class="tab-btn flex-1 py-2.5 text-gray-400 rounded-full text-xs font-black"
            >
              逐字稿
            </button>
          </div>
        </div>

        <div
          id="view-note"
          class="flex-1 overflow-y-auto px-6 py-4 no-scrollbar bg-[#FAFAFA]"
        >
          <div class="flex gap-4 mb-6">
            <div
              class="w-10 h-10 bg-[#13B5B1] rounded-2xl flex-shrink-0 flex items-center justify-center text-white text-[11px] font-black shadow-lg shadow-[#13B5B1]/20"
            >
              皮皮
            </div>
            <div
              id="ai-intro-text"
              class="bg-white border border-gray-100 p-4 rounded-2xl rounded-tl-none text-sm text-gray-700 shadow-sm font-medium leading-relaxed"
            >
              皮皮已經為您準備好筆記了！
            </div>
          </div>

          <div id="note-cards-container"></div>

          <div class="flex flex-col gap-2 mt-4 pb-12">
            <button
              data-action="quiz"
              class="w-full py-3 bg-white border border-brand text-brand rounded-2xl text-xs font-black shadow-sm flex items-center justify-center gap-2 active:scale-95 transition-all"
            >
              ✨ 智能複習測驗
            </button>

            <div class="flex gap-2">
              <button
                data-action="change-category"
                class="flex-1 py-3 bg-white border border-orange-400 text-orange-500 rounded-2xl text-xs font-black shadow-sm flex items-center justify-center gap-2 active:scale-95 transition-all"
              >
                🏷️ 切換分類
              </button>
              <button
                data-action="expand"
                class="flex-1 py-3 bg-white border border-brand text-brand rounded-2xl text-xs font-black shadow-sm flex items-center justify-center gap-2 active:scale-95 transition-all"
              >
                📚 擴充建議
              </button>
            </div>
          </div>
        </div>

        <div
          id="view-transcript"
          class="flex-1 overflow-y-auto px-6 py-6 hidden no-scrollbar bg-white"
        >
          <div id="transcript-container" class="timeline-container">
            <div class="timeline-line"></div>
          </div>
        </div>

        <div
          class="px-6 py-6 border-t border-gray-50 bg-white shadow-[0_-5px_15px_rgba(0,0,0,0.01)]"
        >
          <div class="flex items-center gap-4">
            <div
              class="w-10 h-10 flex items-center justify-center bg-[#13B5B1] text-white rounded-2xl shadow-lg shadow-[#13B5B1]/20"
            >
              <i class="fas fa-play text-sm"></i>
            </div>
            <div
              class="flex-1 h-1.5 bg-gray-100 rounded-full relative overflow-hidden"
            >
              <div
                id="playback-bar"
                class="absolute top-0 left-0 w-full h-full bg-[#13B5B1] rounded-full"
              ></div>
            </div>
            <span
              id="content-duration"
              class="text-[10px] text-gray-400 font-black tracking-tighter"
              >00:00 / 00:00</span
            >
          </div>
        </div>
      </div>

      <!-- =========================================================
        5) Trash
      ========================================================== -->
      <div id="page-trash" class="page hidden page-trash overflow-hidden">
        <header class="app-header shadow-sm">
          <div class="header-content-wrapper">
            <div class="left-slot">
              <div
                data-page="page-home"
                class="w-10 h-10 flex items-center justify-center rounded-xl text-gray-400 cursor-pointer active:scale-90 transition-all"
              >
                <i class="fas fa-chevron-left"></i>
              </div>
            </div>
            <div class="center-slot">
              <h1 class="text-base font-black text-gray-800">回收站</h1>
            </div>
            <div class="right-slot">
              <button
                data-action="trash-clear-all"
                type="button"
                class="text-[10px] font-black text-red-400 bg-red-50 px-3 py-2 rounded-xl active:scale-95 transition-all"
              >
                清空全部
              </button>
            </div>
          </div>
        </header>

        <div class="list-bars-container bg-white border-b border-gray-100">
          <div class="rwd-content-wrapper px-6 py-3 border-b border-gray-50">
            <div
              class="flex items-center bg-gray-50 rounded-2xl px-3 border border-gray-100 focus-within:border-[#13B5B1] transition-all"
            >
              <i class="fas fa-search text-gray-300 text-xs"></i>
              <input
                type="text"
                id="search-trash"
                placeholder="搜尋刪除內容..."
                class="bg-transparent border-none outline-none px-2 py-2 text-xs w-full font-bold text-gray-600"
              />
            </div>
          </div>

          <div
            class="rwd-content-wrapper px-6 py-2 flex items-center justify-between bg-white/95 backdrop-blur-sm"
          >
            <div class="flex gap-4">
              <span
                data-filter="all"
                class="text-xs font-black text-[#13B5B1] cursor-pointer border-b-2 border-[#13B5B1] pb-1"
                >全部</span
              >
              <span
                data-filter="fav"
                class="text-xs font-black text-gray-300 cursor-pointer pb-1"
                >★ 收藏</span
              >
            </div>

            <div class="flex items-center gap-3">
              <button
                type="button"
                data-action="trash-select-all"
                class="text-[10px] font-black text-[#13B5B1] bg-[#F0F9F9] px-3 py-1.5 rounded-xl active:scale-95 transition-all"
              >
                一鍵全選
              </button>

              <div class="relative flex items-center">
                <i
                  class="fas fa-calendar-day text-gray-300 text-sm cursor-pointer hover:text-[#13B5B1] transition-colors"
                  data-action="open-date-picker-trash"
                ></i>
                <input
                  type="date"
                  id="date-filter-trash"
                  class="absolute opacity-0 w-0 h-0 pointer-events-none"
                />
              </div>
              <div id="category-filter-trash"></div>
              <button
                id="clear-date-trash"
                data-action="clear-date"
                class="hidden text-[10px] font-black text-red-400 bg-red-50 px-2 py-1 rounded-lg"
              >
                清除日期
              </button>
            </div>
          </div>
        </div>

        <div class="flex-1 overflow-y-auto no-scrollbar">
          <div class="p-6">
            <div id="trash-container" class="flex flex-col gap-3"></div>

            <div
              id="trash-empty-state"
              class="hidden flex flex-col items-center justify-center py-20 text-gray-300"
            >
              <i class="fas fa-trash-alt text-5xl mb-4 opacity-20"></i>
              <p class="text-xs font-bold">回收站空空如也</p>
            </div>
          </div>
        </div>

        <div class="trash-cta">
          <button
            id="btn-batch-restore"
            type="button"
            data-action="trash-batch-restore"
            class="cta-btn cta-soft"
          >
            <i class="fas fa-undo-alt"></i> 批量還原
          </button>
          <button
            id="btn-batch-delete"
            type="button"
            data-action="trash-batch-delete"
            class="cta-btn cta-danger"
          >
            <i class="fas fa-trash-alt"></i> 永久刪除
          </button>
        </div>
      </div>

      <!-- =========================================================
        6) Review
      ========================================================== -->
      <div id="page-review" class="page hidden page-review overflow-hidden">
        <header class="app-header shadow-sm">
          <div class="header-content-wrapper">
            <div class="left-slot">
              <div
                data-page="page-home"
                class="w-10 h-10 flex items-center justify-center rounded-xl text-gray-400 cursor-pointer active:scale-90 transition-all"
              >
                <i class="fas fa-chevron-left"></i>
              </div>
            </div>
            <div class="center-slot">
              <h1 class="text-base font-black text-gray-800">智能複習</h1>
            </div>
            <div class="right-slot"></div>
          </div>
        </header>

        <div class="list-bars-container bg-white border-b border-gray-100">
          <div class="rwd-content-wrapper px-6 py-3 border-b border-gray-50">
            <div
              class="flex items-center bg-gray-50 rounded-2xl px-3 border border-gray-100 focus-within:border-[#13B5B1] transition-all"
            >
              <i class="fas fa-search text-gray-300 text-xs"></i>
              <input
                type="text"
                id="search-review"
                placeholder="搜尋複習項目..."
                class="bg-transparent border-none outline-none px-2 py-2 text-xs w-full font-bold text-gray-600"
              />
            </div>
          </div>
          <div
            class="rwd-content-wrapper px-6 py-2 flex items-center justify-between bg-white/95 backdrop-blur-sm"
          >
            <div class="flex gap-4">
              <span
                data-filter="all"
                class="text-xs font-black text-[#13B5B1] cursor-pointer border-b-2 border-[#13B5B1] pb-1"
                >全部</span
              >
              <span
                data-filter="fav"
                class="text-xs font-black text-gray-300 cursor-pointer pb-1"
                >★ 收藏</span
              >
            </div>
            <div class="flex items-center gap-3">
              <button
                type="button"
                data-action="review-select-all"
                class="text-[10px] font-black text-[#13B5B1] bg-[#F0F9F9] px-3 py-1.5 rounded-xl active:scale-95 transition-all"
              >
                一鍵全選
              </button>

              <div class="relative flex items-center">
                <i
                  class="fas fa-calendar-day text-gray-300 text-sm cursor-pointer hover:text-[#13B5B1] transition-colors"
                  data-action="open-date-picker-review"
                ></i>
                <input
                  type="date"
                  id="date-filter-review"
                  class="absolute opacity-0 w-0 h-0 pointer-events-none"
                />
              </div>
              <div id="category-filter-review"></div>
              <button
                id="clear-date-review"
                data-action="clear-date"
                class="hidden text-[10px] font-black text-red-400 bg-red-50 px-2 py-1 rounded-lg"
              >
                清除日期
              </button>
            </div>
          </div>
        </div>

        <div class="review-scroll flex-1 overflow-y-auto no-scrollbar">
          <div class="px-6 pt-6">
            <div class="flex justify-between items-center mb-4">
              <p
                class="text-[10px] text-gray-300 font-black tracking-widest uppercase"
              >
                請挑選欲複習的筆記
              </p>
            </div>

            <div id="review-note-list" class="space-y-3"></div>
          </div>
        </div>

        <div class="review-cta">
          <button
            id="btn-start-review"
            type="button"
            data-action="run-smart-quiz"
            class="cta-btn cta-primary"
          >
            <i class="fas fa-bolt"></i> 開始挑戰
          </button>
        </div>
      </div>

      <!-- =========================================================
        7) Settings
      ========================================================== -->
      <div
        id="page-settings"
        class="page hidden page-settings overflow-hidden bg-[#F8FAFA]"
      >
        <header class="app-header shadow-sm">
          <div class="header-content-wrapper">
            <div class="left-slot">
              <div
                data-page="page-home"
                class="w-10 h-10 flex items-center justify-center rounded-xl text-gray-400 cursor-pointer"
              >
                <i class="fas fa-chevron-left"></i>
              </div>
            </div>
            <div class="center-slot">
              <h1 class="text-base font-black text-gray-800">個人設定</h1>
            </div>
            <div class="right-slot"></div>
          </div>
        </header>

        <div class="settings-scroll no-scrollbar">
          <div class="px-6 pt-6">
            <section class="mb-8">
              <p
                class="text-[10px] text-gray-300 font-black tracking-widest uppercase mb-4 ml-1"
              >
                個人檔案與頭像
              </p>
              <div
                class="bg-white p-5 rounded-[2rem] border border-gray-100 shadow-sm space-y-6"
              >
                <div>
                  <label
                    class="text-[10px] font-black text-gray-400 uppercase ml-1"
                    >您的暱稱</label
                  >
                  <input
                    type="text"
                    id="settings-nickname"
                    placeholder="例如：皮皮..."
                    class="w-full mt-1 bg-gray-50 border-none rounded-xl px-4 py-3 text-xs font-bold outline-none focus:ring-1 focus:ring-[#13B5B1]"
                  />
                </div>

                <div>
                  <label
                    class="text-[10px] font-black text-gray-400 uppercase ml-1 mb-3 block"
                    >個人頭貼</label
                  >
                  <div
                    class="flex items-center gap-4 bg-gray-50 p-3 rounded-2xl border border-gray-100/50"
                  >
                    <div
                      id="settings-avatar-preview"
                      class="w-16 h-16 rounded-2xl bg-white border border-gray-100 p-1 flex-shrink-0 shadow-sm"
                    >
                      <img
                        src=""
                        class="w-full h-full object-contain"
                        alt="Avatar Preview"
                      />
                    </div>
                    <div class="flex flex-col gap-1">
                      <p class="text-[10px] font-black text-gray-400 uppercase">
                        目前頭貼
                      </p>
                      <button
                        type="button"
                        data-action="open-avatar-modal"
                        class="text-xs font-black text-[#13B5B1] flex items-center gap-1 hover:opacity-70 transition-all active:scale-95"
                      >
                        <i class="fas fa-edit"></i> 修改頭貼
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </section>

            <section class="mb-8">
              <p
                class="text-[10px] text-gray-300 font-black tracking-widest uppercase mb-4 ml-1"
              >
                資料管理
              </p>
              <div class="space-y-3">
                <button
                  data-action="export-data"
                  class="w-full py-4 bg-white border border-gray-100 text-gray-600 rounded-2xl text-xs font-black shadow-sm active:scale-95"
                >
                  匯出筆記 JSON 備份
                </button>
                <button
                  data-action="clear-all-data"
                  class="w-full py-4 bg-red-50 text-red-500 rounded-2xl text-xs font-black active:scale-95"
                >
                  永久清除所有資料
                </button>
              </div>
            </section>
          </div>
        </div>

        <div class="settings-cta">
          <button data-action="save-settings" class="cta-btn cta-primary">
            儲存個人化設定
          </button>
        </div>
      </div>

      <!-- =========================================================
        AI Modal
      ========================================================== -->
      <div id="ai-modal">
        <div
          class="bg-white w-full max-h-[70%] rounded-[2.5rem] p-6 shadow-2xl flex flex-col relative"
        >
          <button
            data-action="modal-close"
            class="absolute top-6 right-6 text-gray-300"
            aria-label="關閉"
          >
            <i class="fas fa-times text-xl"></i>
          </button>
          <div
            id="modal-content"
            class="overflow-y-auto no-scrollbar pt-4"
          ></div>
        </div>
      </div>

      <!-- =========================================================
        Main Navigation
      ========================================================== -->
      <div
        id="main-nav"
        class="bg-white border-t border-gray-100 flex justify-around py-6 px-6 z-40 shadow-[0_-10px_30px_rgba(0,0,0,0.03)]"
      >
        <div
          data-page="page-home"
          id="nav-home"
          class="nav-item-active cursor-pointer"
          role="button"
        >
          <i class="fas fa-home text-2xl"></i>
        </div>
        <div
          data-page="page-list"
          id="nav-notes"
          class="nav-item-inactive cursor-pointer"
          role="button"
        >
          <i class="fas fa-book text-2xl"></i>
        </div>
        <div
          data-page="page-review"
          id="nav-review"
          class="nav-item-inactive cursor-pointer"
          role="button"
        >
          <i class="fas fa-graduation-cap text-2xl"></i>
        </div>
        <div
          data-page="page-trash"
          id="nav-trash"
          class="nav-item-inactive cursor-pointer"
          role="button"
        >
          <i class="fas fa-trash text-2xl"></i>
        </div>
        <div
          data-page="page-settings"
          id="nav-settings"
          class="nav-item-inactive cursor-pointer"
          role="button"
        >
          <i class="fas fa-cog text-2xl"></i>
        </div>
      </div>

      <!-- =========================================================
        Confirm Modal
      ========================================================== -->
      <div id="confirm-modal">
        <div class="bg-white w-[80%] rounded-3xl p-6 shadow-2xl text-center">
          <div
            class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl"
          >
            <i class="fas fa-trash-alt"></i>
          </div>
          <h3 class="font-black text-lg mb-2 text-gray-800">確定要刪除嗎？</h3>
          <div class="flex gap-3">
            <button
              data-action="confirm-cancel"
              class="flex-1 py-3 bg-gray-100 text-gray-500 rounded-2xl font-bold text-xs"
            >
              取消
            </button>
            <button
              id="btn-real-delete"
              class="flex-1 py-3 bg-red-500 text-white rounded-2xl font-bold text-xs"
            >
              確認刪除
            </button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
